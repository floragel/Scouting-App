services:
  - type: web
    name: frc-scouting-app
    env: python
    region: ohio
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: frc-scouting-db
          property: connectionString
      # TBA_API_KEY must be added manually in the dashboard for security

databases:
  - name: frc-scouting-db
    region: ohio
    plan: free
    databaseName: scouting
    user: admin
